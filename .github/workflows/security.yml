name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go tool govulncheck ./...
