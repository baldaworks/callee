profiles:
    default:
        tool:
            name: callee
            main: ./cmd/callee
        version:
            source: git-tag
        targets:
            - os: darwin
              arch: amd64
            - os: darwin
              arch: arm64
            - os: linux
              arch: amd64
            - os: linux
              arch: arm64
            - os: windows
              arch: amd64
        build:
            ldflags: -s -w -X github.com/normahq/codex-acp-bridge/internal/version.buildVersion=v1.7.7
            tags: []
            cgo: false
        distributions:
            npm:
                package: '@baldaworks/callee'
                registry: https://registry.npmjs.org
                access: public
                include-readme: true
